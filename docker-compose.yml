# One-command demo: `docker compose up --build`, then open http://localhost:8080
#
#   db   — PostgreSQL + pgvector (the extension is created up front by the init script)
#   api  — Web API + dashboard; applies EF migrations on startup
#   worker — ingestion pipeline (waits for the API to be healthy, i.e. migrated)

services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_PASSWORD: depradar
      POSTGRES_DB: depradardb
    volumes:
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d depradardb"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      target: api
    environment:
      ASPNETCORE_ENVIRONMENT: Development # applies EF migrations on startup
      ConnectionStrings__depradardb: "Host=db;Port=5432;Database=depradardb;Username=postgres;Password=depradar"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  worker:
    build:
      context: .
      target: worker
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__depradardb: "Host=db;Port=5432;Database=depradardb;Username=postgres;Password=depradar"
    depends_on:
      api:
        condition: service_healthy # the schema exists once the API has migrated
