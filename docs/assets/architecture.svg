<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="940" height="560" rx="14" fill="#0d1117"/>

  <text x="40" y="46" fill="#e6edf3" font-size="22" font-weight="700">DepRadar<tspan fill="#9fb0c3" font-size="14" font-weight="400"> — Clean Architecture (arrows point inward)</tspan></text>

  <!-- Presentation -->
  <text x="40" y="86" fill="#2dd4bf" font-size="12" font-weight="700" letter-spacing="1.5">PRESENTATION — THREE HOSTS ON ONE CORE</text>
  <g font-size="13" fill="#e6edf3" text-anchor="middle">
    <rect x="40"  y="98" width="180" height="58" rx="10" fill="#0f1825" stroke="#2dd4bf"/>
    <text x="130" y="124" font-weight="600">Web API</text>
    <text x="130" y="142" font-size="11" fill="#9fb0c3">SignalR · Scalar · badges</text>

    <rect x="240" y="98" width="180" height="58" rx="10" fill="#0f1825" stroke="#2dd4bf"/>
    <text x="330" y="124" font-weight="600">Worker</text>
    <text x="330" y="142" font-size="11" fill="#9fb0c3">Channels · watchlist · digest</text>

    <rect x="440" y="98" width="180" height="58" rx="10" fill="#0f1825" stroke="#2dd4bf"/>
    <text x="530" y="124" font-weight="600">CLI · dotnet tool</text>
    <text x="530" y="142" font-size="11" fill="#9fb0c3">scan · gate · diff · fix</text>
  </g>

  <!-- Application -->
  <text x="40" y="196" fill="#2dd4bf" font-size="12" font-weight="700" letter-spacing="1.5">APPLICATION</text>
  <rect x="40" y="208" width="580" height="120" rx="12" fill="#0f1825" stroke="#21304a"/>
  <g font-size="12.5" fill="#e6edf3" text-anchor="middle">
    <rect x="58"  y="226" width="250" height="40" rx="8" fill="#111c2e" stroke="#21304a"/>
    <text x="183" y="251" font-weight="600">Use cases · hand-rolled Mediator</text>

    <rect x="58"  y="276" width="250" height="40" rx="8" fill="#111c2e" stroke="#21304a"/>
    <text x="183" y="293" font-size="11" fill="#9fb0c3">Pure services — Scorer · Drift · Diff</text>
    <text x="183" y="308" font-size="11" fill="#9fb0c3">Policy · SBOM · SARIF · Badge · Remediation</text>

    <rect x="328" y="226" width="274" height="90" rx="8" fill="#111c2e" stroke="#2dd4bf" stroke-dasharray="4 3"/>
    <text x="465" y="266" font-weight="700">Ports (interfaces)</text>
    <text x="465" y="286" font-size="11" fill="#9fb0c3">resolver · vulnerabilities · repos</text>
    <text x="465" y="301" font-size="11" fill="#9fb0c3">LLM · notifiers · PR opener</text>
  </g>

  <!-- Domain -->
  <text x="40" y="368" fill="#34d399" font-size="12" font-weight="700" letter-spacing="1.5">DOMAIN — DEPENDENCY-FREE</text>
  <rect x="40" y="380" width="580" height="64" rx="12" fill="#16241b" stroke="#34d399"/>
  <text x="330" y="408" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="middle">Entities · Value Objects (PackageId · SemVer · SpdxLicense)</text>
  <text x="330" y="428" fill="#9fb0c3" font-size="11.5" text-anchor="middle">PackageRiskScorer · DriftAnalyzer · DriftAlert — pure, unit-tested</text>

  <!-- Infrastructure (right) -->
  <text x="660" y="196" fill="#fb923c" font-size="12" font-weight="700" letter-spacing="1.5">INFRASTRUCTURE</text>
  <rect x="660" y="208" width="240" height="236" rx="12" fill="#0f1825" stroke="#fb923c" stroke-opacity="0.6"/>
  <text x="780" y="230" fill="#9fb0c3" font-size="11" text-anchor="middle" font-style="italic">implements the ports</text>
  <g font-size="12" fill="#e6edf3" text-anchor="middle">
    <rect x="676" y="242" width="208" height="36" rx="8" fill="#111c2e" stroke="#21304a"/>
    <text x="780" y="265">EF Core 10 · Postgres + pgvector</text>
    <rect x="676" y="286" width="208" height="36" rx="8" fill="#111c2e" stroke="#21304a"/>
    <text x="780" y="309">NuGet · OSV · deps.dev · GitHub</text>
    <rect x="676" y="330" width="208" height="36" rx="8" fill="#111c2e" stroke="#21304a"/>
    <text x="780" y="353">HybridCache + Redis · LLM seam</text>
    <rect x="676" y="374" width="208" height="36" rx="8" fill="#111c2e" stroke="#21304a"/>
    <text x="780" y="397">Slack · GitHub issues · PR opener</text>
  </g>

  <!-- arrows: presentation -> application -->
  <g stroke="#5b6b82" stroke-width="1.6" fill="none" marker-end="url(#a)">
    <path d="M130 156 L130 206"/>
    <path d="M330 156 L330 206"/>
    <path d="M530 156 L500 206"/>
    <!-- application -> domain -->
    <path d="M330 328 L330 378"/>
    <!-- infrastructure -> ports (implements, dashed) -->
    <path d="M658 300 L604 282" stroke-dasharray="5 4"/>
  </g>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5b6b82"/>
    </marker>
  </defs>

  <text x="470" y="500" fill="#5b6b82" font-size="11.5" text-anchor="middle">The CLI resolves only the network-backed ports (no EF) — the whole analysis runs with no database.</text>
  <text x="470" y="520" fill="#5b6b82" font-size="11.5" text-anchor="middle">Every feature is a thin composition over the same Domain model.</text>
</svg>
